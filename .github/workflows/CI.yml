name: CI
on:
  pull_request:
  push:
    branches:
      - master
      - main
      - dev

jobs:
  Test:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip test]') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - ubuntu-24.04
          - macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            D:\.pnpm-store
          key: "cache-OS:${{ matrix.os }}-${{ hashFiles('./.npmrc', './pnpm-lock.yaml', './package.json', './.nvmrc') }}"
          restore-keys: |
            "cache-OS:${{ matrix.os }}-"

      - name: Setup Pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      # - uses: denoland/setup-deno@v1
      #   with:
      #     deno-version: v1.x

      - name: Install and build
        run: |
          pnpm install

      # - name: Setup SSH debugging session
      #   uses: mxschmitt/action-tmate@v3

      - name: Test
        if: ${{ !contains(github.event.head_commit.message, '[skip ci test]') }}
        run: |
          pnpm run test

      - name: Lint
        if: ${{ !contains(github.event.head_commit.message, '[skip ci lint]') }}
        run: |
          pnpm run test.lint

      - name: Setup Node 12
        if: ${{ !contains(matrix.os, 'macos') }}
        uses: actions/setup-node@v4
        with:
          node-version: 12
      - name: Smoke Test Node 12
        if: ${{ !contains(matrix.os, 'macos') }}
        run: |
          node ./dist/index.node.cjs
